<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Brand dashboard preview | Swavant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0a0a0a; --paper:#f6f4ef; --paper-dim:#eae6dc;
  --gold:#c9a46a; --gold-bright:#e3c48f; --line:rgba(246,244,239,0.14);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:var(--ink);color:var(--paper);font-family:'Inter',ui-sans-serif,system-ui,sans-serif;line-height:1.6;}
.serif{font-family:'Fraunces',Georgia,serif;}
a{color:inherit;text-decoration:none;}
::selection{background:var(--gold);color:var(--ink);}
.wrap{max-width:1180px;margin:0 auto;padding:0 24px;}
header{position:sticky;top:0;z-index:50;background:rgba(10,10,10,0.9);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
.nav{display:flex;align-items:center;justify-content:space-between;height:84px;}
.logo{display:flex;align-items:center;gap:10px;font-size:1.3rem;}
.logo small{font-size:0.6rem;letter-spacing:0.3em;text-transform:uppercase;color:var(--gold);font-family:'Inter',sans-serif;font-weight:600;margin-left:6px;}
.navlinks{display:flex;gap:22px;font-size:0.85rem;color:rgba(246,244,239,0.8);white-space:nowrap;}
.navlinks a:hover{color:var(--gold);}
.navcta{display:flex;gap:16px;align-items:center;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:999px;padding:14px 28px;font-size:0.8rem;font-weight:600;text-transform:uppercase;letter-spacing:0.14em;transition:all .3s ease;}
.btn-primary{background:var(--gold);color:var(--ink);}
.btn-primary:hover{background:var(--gold-bright);transform:translateY(-2px);}
.btn-outline{border:1px solid rgba(246,244,239,0.3);color:var(--paper);}
.btn-outline:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-2px);}
.btn-sm{padding:10px 20px;font-size:0.72rem;}
.eyebrow{display:inline-block;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.32em;color:var(--gold);padding-bottom:12px;position:relative;margin-bottom:8px;}
.eyebrow::after{content:"";position:absolute;left:0;bottom:0;width:40px;height:2px;background:var(--gold);}
section{padding:96px 0;border-bottom:1px solid var(--line);}
section:last-of-type{border-bottom:none;}
h1.hero-title{font-size:clamp(2.6rem,6vw,4.6rem);line-height:1.05;max-width:900px;margin:24px 0;}
h1.hero-title em{color:var(--gold);font-style:italic;}
.lead{font-size:1.15rem;color:rgba(246,244,239,0.65);max-width:560px;margin-bottom:40px;}
.hero{padding-top:120px;padding-bottom:140px;position:relative;overflow:hidden;}
.hero::before{content:"";position:absolute;inset:0;opacity:.08;background:radial-gradient(circle at 20% 20%, var(--gold), transparent 45%),radial-gradient(circle at 80% 60%, var(--gold), transparent 40%);pointer-events:none;}
.tagline{display:flex;align-items:center;gap:10px;color:var(--gold);font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.3em;margin-bottom:8px;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:32px;padding:64px 0;border-bottom:1px solid var(--line);}
.stat h3{font-size:clamp(1.5rem,3.2vw,2.6rem);margin:0;white-space:nowrap;}
.stat span{color:var(--gold);}
.stat p{color:rgba(246,244,239,0.55);font-size:0.85rem;margin-top:8px;}
.marquee-wrap{overflow:hidden;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:32px 0;}
.marquee{display:flex;gap:64px;width:max-content;animation:scroll 28s linear infinite;}
.marquee span{white-space:nowrap;font-family:'Fraunces',serif;font-style:italic;font-size:1.3rem;color:rgba(246,244,239,0.35);}
@keyframes scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;}
.card{border:1px solid var(--line);background:rgba(246,244,239,0.03);border-radius:16px;padding:32px;transition:all .35s cubic-bezier(.22,1,.36,1);}
.card:hover{transform:translateY(-6px);border-color:var(--gold);box-shadow:0 20px 60px -20px rgba(201,164,106,.35);}
.card h3{font-size:1.3rem;margin:20px 0 10px;}
.card p{color:rgba(246,244,239,0.6);font-size:0.92rem;margin:0;}
.section-head{display:flex;justify-content:space-between;align-items:flex-end;gap:24px;flex-wrap:wrap;margin-bottom:48px;}
.section-head h2{font-size:clamp(1.8rem,3.5vw,2.6rem);max-width:560px;margin:0;}
.diamond{color:var(--gold);}
footer{padding:80px 0 32px;}
.footcols{display:grid;grid-template-columns:1.4fr 1fr 1fr 1fr;gap:48px;}
.footcols h4{font-size:0.7rem;text-transform:uppercase;letter-spacing:0.25em;color:var(--gold);margin-bottom:16px;}
.footcols ul{list-style:none;padding:0;margin:0;display:flex;flex-direction:column;gap:12px;font-size:0.9rem;color:rgba(246,244,239,0.7);}
.footcols ul a:hover{color:var(--gold);}
.footbottom{margin-top:64px;padding-top:32px;border-top:1px solid var(--line);display:flex;justify-content:space-between;font-size:0.78rem;color:rgba(246,244,239,0.45);flex-wrap:wrap;gap:12px;}
.pagehero{padding:100px 0 64px;border-bottom:1px solid var(--line);}
.pagehero h1{font-size:clamp(2.2rem,5vw,3.6rem);max-width:700px;margin:16px 0;}
.badge{display:inline-block;border:1px solid rgba(201,164,106,0.4);color:var(--gold);font-size:0.62rem;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;padding:5px 14px;border-radius:999px;}
.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:40px;}
.steps .num{font-family:'Fraunces',serif;font-size:1.8rem;color:var(--gold);}
.reasons{display:grid;grid-template-columns:repeat(2,1fr);gap:32px;}
.reason{display:flex;gap:16px;}
form input,form textarea,form select{width:100%;background:transparent;border:1px solid var(--line);border-radius:10px;padding:13px 16px;color:var(--paper);font-size:0.92rem;font-family:'Inter',sans-serif;}
form label{display:block;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.18em;color:rgba(246,244,239,0.6);margin-bottom:8px;}
form .field{margin-bottom:20px;}
.two-col-form{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
table{width:100%;border-collapse:collapse;font-size:0.9rem;}
th{text-align:left;padding:12px 16px;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.15em;color:rgba(246,244,239,0.5);border-bottom:1px solid var(--line);background:rgba(246,244,239,0.03);}
td{padding:14px 16px;border-bottom:1px solid var(--line);}
.status{display:inline-block;padding:4px 12px;border-radius:999px;font-size:0.62rem;font-weight:700;text-transform:uppercase;letter-spacing:0.15em;}
.status-live{background:rgba(16,185,129,0.1);color:#34d399;border:1px solid rgba(16,185,129,0.3);}
.status-pending{background:rgba(234,179,8,0.1);color:#fbbf24;border:1px solid rgba(234,179,8,0.3);}
@media(max-width:900px){
  .navlinks{display:none;}
  .stats{grid-template-columns:repeat(2,1fr);}
  .grid3,.grid2,.reasons,.steps,.footcols,.two-col-form{grid-template-columns:1fr;}
}
.dash{display:flex;min-height:100vh;}
.sidebar{width:260px;flex-shrink:0;border-right:1px solid var(--line);display:flex;flex-direction:column;}
.sidebar .logo{padding:24px;border-bottom:1px solid var(--line);}
.sidebar nav{flex:1;padding:24px 16px;display:flex;flex-direction:column;gap:4px;}
.sidebar nav a{padding:10px 12px;border-radius:8px;font-size:.9rem;color:rgba(246,244,239,.7);display:flex;align-items:center;gap:10px;}
.sidebar nav a.active,.sidebar nav a:hover{background:rgba(246,244,239,.05);color:var(--gold);}
.sidebar .foot{padding:16px 24px;border-top:1px solid var(--line);font-size:.8rem;color:rgba(246,244,239,.4);}
.dashmain{flex:1;padding:48px;}
.dash-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:40px;}
.dstat{background:rgba(246,244,239,.03);border:1px solid var(--line);border-radius:16px;padding:24px;}
.dstat p.label{font-size:.7rem;text-transform:uppercase;letter-spacing:.15em;color:rgba(246,244,239,.5);margin:0;}
.dstat p.value{font-family:'Fraunces',serif;font-size:1.9rem;margin:12px 0 0;}
.tabs{display:flex;gap:8px;border-bottom:1px solid var(--line);margin-bottom:0;}
.tabs a{padding:14px 4px;margin-right:28px;font-size:.9rem;color:rgba(246,244,239,.5);border-bottom:2px solid transparent;}
.tabs a.active{color:var(--paper);border-color:var(--gold);}
@media(max-width:900px){.sidebar{display:none;}.dash-stats{grid-template-columns:repeat(2,1fr);}}
.deco-diamond{position:absolute;pointer-events:none;opacity:.07;z-index:0;}
.hero-photo{position:relative;overflow:hidden;border-bottom:1px solid var(--line);}
.hero-photo-bg{position:absolute;inset:0;z-index:0;}
.hero-photo-bg img{width:100%;height:100%;object-fit:cover;filter:grayscale(.35) contrast(1.1) brightness(.55);}
.hero-photo-bg::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(10,10,10,.55) 0%,rgba(10,10,10,.75) 55%,rgba(10,10,10,.96) 100%),radial-gradient(circle at 15% 20%,rgba(201,164,106,.28),transparent 45%);}
.hero-photo-content{position:relative;z-index:1;}
.split-hero{display:grid;grid-template-columns:1.1fr 0.9fr;gap:56px;align-items:center;position:relative;z-index:1;}
.split-hero-frame{position:relative;border-radius:24px;overflow:hidden;border:1px solid rgba(201,164,106,.35);aspect-ratio:4/5;}
.split-hero-frame img{width:100%;height:100%;object-fit:cover;display:block;}
.split-hero-frame::after{content:"";position:absolute;inset:0;box-shadow:inset 0 0 0 1px rgba(246,244,239,.06);}
.glow-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.18;pointer-events:none;z-index:0;background:var(--gold);}
@media(max-width:900px){
  .split-hero{grid-template-columns:1fr;}
  .split-hero-frame{aspect-ratio:16/9;order:-1;}
}
.pagehero{position:relative;overflow:hidden;}
.pagehero::before{content:"";position:absolute;top:-120px;right:-100px;width:420px;height:420px;border-radius:50%;background:var(--gold);opacity:.14;filter:blur(100px);pointer-events:none;z-index:0;}
.pagehero .wrap{position:relative;z-index:1;}
.menu-toggle{display:none;background:none;border:none;color:var(--paper);font-size:1.7rem;line-height:1;cursor:pointer;padding:4px 6px;}
.mobile-menu{display:none;position:fixed;top:84px;left:0;right:0;bottom:0;background:var(--ink);z-index:80;flex-direction:column;padding:8px 24px 32px;overflow-y:auto;}
.mobile-menu.open{display:flex;}
.mobile-menu a{padding:16px 4px;border-bottom:1px solid var(--line);font-size:1.05rem;color:var(--paper);}
.mobile-menu a.btn{border-bottom:none;margin-top:20px;text-align:center;}
@media(max-width:900px){
  .menu-toggle{display:block;}
  .navcta{display:none;}
  .stat h3{font-size:clamp(1.3rem,6vw,1.9rem)!important;}
}
@media(max-width:480px){
  .hero-title{font-size:2.05rem;}
  .pagehero h1{font-size:1.9rem;}
  .lead{font-size:1rem;}
  .nav{height:72px;}
  .mobile-menu{top:72px;}
  .wrap{padding:0 18px;}
  section{padding:64px 0;}
  .split-hero-frame{aspect-ratio:4/3;}
  .stats{grid-template-columns:repeat(2,1fr);gap:20px;}
  .footcols{gap:32px;}
}
.staging-badge{position:fixed;bottom:16px;right:16px;z-index:100;background:var(--gold);color:var(--ink);font-size:.68rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;padding:8px 14px;border-radius:999px;box-shadow:0 8px 20px -6px rgba(0,0,0,.6);pointer-events:none;}

</style>
</head>
